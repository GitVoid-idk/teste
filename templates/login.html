<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WiFi da Cidade</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --accent: #58a6ff;
      --accent2: #3fb950;
      --text: #e6edf3;
      --muted: #8b949e;
      --danger: #f85149;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .stars {
      position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0;
    }
    .star {
      position: absolute;
      width: 2px; height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0.4;
      animation: twinkle 3s infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.1; }
      to { opacity: 0.6; }
    }

    .card {
      position: relative; z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 0 60px rgba(88,166,255,0.08);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
    }

    .logo-text h1 {
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .logo-text p {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 1.25rem;
    }

    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      transition: border-color 0.2s;
      outline: none;
    }

    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
    }

    button {
      width: 100%;
      padding: 0.8rem;
      background: linear-gradient(135deg, var(--accent), #1f6feb);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }

    .erro {
      background: rgba(248,81,73,0.1);
      border: 1px solid rgba(248,81,73,0.4);
      color: var(--danger);
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }

    .hint {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.78rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>

  <div class="card">
    <div class="logo">
      <div class="logo-icon">📡</div>
      <div class="logo-text">
        <h1>WiFi da Cidade</h1>
        <p>Acesso exclusivo para amigos</p>
      </div>
    </div>

    {% if erro %}
    <div class="erro">{{ erro }}</div>
    {% endif %}

    <form method="post" action="/login">
      <label class="label" for="senha">Senha de acesso</label>
      <div class="input-wrap">
        <input type="password" id="senha" name="senha" placeholder="••••••••" autofocus required>
      </div>
      <button type="submit">Entrar →</button>
    </form>

    <p class="hint">Não tem a senha? Peça para o administrador.</p>
  </div>

  <script>
    const stars = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.animationDelay = Math.random() * 3 + 's';
      s.style.animationDuration = (2 + Math.random() * 3) + 's';
      stars.appendChild(s);
    }
  </script>
</body>
</html>
